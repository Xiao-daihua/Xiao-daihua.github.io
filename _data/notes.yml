# ================================================================
# Notes data file
# ----------------------------------------------------------------
# Each entry produces one card on /notes/.
#
# Required fields:
#   title    : displayed name
#   repo     : GitHub repo name under your account, e.g. "EPFL_course"
#   dir      : subfolder containing main.pdf, e.g. "QFT_1_course"
#   category : "Lecture" or "Learning"
#   topic    : free-form topic tag, e.g. "QFT", "CFT", "Math"
#               (used for filter chips — keep them consistent so
#                they group nicely)
#
# Optional fields:
#   language    : "EN" (default if omitted) or "ZH"
#   status      : "complete" (default), "wip", or "draft"
#   description : 1-3 sentence summary shown on the card
#   pdf_name    : PDF file name (default "main.pdf")
#   featured    : true/false. Featured topic chips are shown in the
#                 collapsed filter bar; non-featured topics live
#                 behind the "More" toggle. If you don't set this
#                 anywhere, ALL topics show by default.
# ================================================================

