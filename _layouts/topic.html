---
layout: default
---

<div class="toggle-btn" onclick="toggleSidebar()">☰ Index</div>

<div class="page-wrapper">
  {%- include sidebar.html -%}

  <div class="topic-content" id="pageContent" data-topic-url="{{ page.url | relative_url }}">
    <h1>{{ page.title }}</h1>
    {%- if page.tags -%}
    <div class="topic-tags">
      {%- for tag in page.tags -%}
        <span class="topic-tag">{{ tag }}</span>
      {%- endfor -%}
    </div>
    {%- endif -%}

    <div class="topic-body">
      {{ content }}
    </div>

    <div id="backlinks" class="backlinks" hidden>
      <h2 class="backlinks-title">Linked from</h2>
      <ul id="backlinks-list"></ul>
    </div>

    <a href="javascript:history.back()" class="back-btn">⟵ Back</a>
  </div>
</div>

{%- include graph-data.html -%}
<script src="{{ '/assets/js/sidebar.js' | relative_url }}"></script>
<script src="{{ '/assets/js/topic-links.js' | relative_url }}"></script>
