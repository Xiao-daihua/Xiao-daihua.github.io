<footer class="site-footer">
  <div class="footer-inner">
    <span class="footer-name">{{ site.author | default: site.title | escape }}</span>
    <span class="footer-sep">·</span>
    {%- if site.email -%}
    <a class="footer-link" href="mailto:{{ site.email }}">@ {{ site.email }}</a>
    <span class="footer-sep">·</span>
    {%- endif -%}
    {%- if site.github_username -%}
    <a class="footer-link" href="https://github.com/{{ site.github_username | cgi_escape }}">GitHub</a>
    <span class="footer-sep">·</span>
    {%- endif -%}
    {%- if site.twitter_username -%}
    <a class="footer-link" href="https://twitter.com/{{ site.twitter_username | cgi_escape }}">Twitter</a>
    <span class="footer-sep">·</span>
    {%- endif -%}
    <span class="footer-copy">© {{ 'now' | date: "%Y" }} {{ site.author | default: site.title | escape }}</span>
  </div>
</footer>
